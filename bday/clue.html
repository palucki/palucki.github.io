<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Zagadka</title>
  <link rel="stylesheet" href="css/styles.css?v=1.0">
  <style>
  
 blockquote
 {
    font-size: 30px;
    background: #f9f9f9;
    border-left: 10px solid #ccc;
    margin: .5em 10px;
    padding: 0 10px;
    quotes: "\201C""\201D""\2018""\2019";
    padding: 10px 20px;
    line-height: 1.4;
}

blockquote:before 
{
    content: open-quote;
    display: inline;
    height: 0;
    line-height: 0;
    left: -10px;
    position: relative;
    top: 30px;
    color: #ccc;
    font-size: 3em;
}

p 
{
    margin: 0;
}

footer 
{
    margin:0;
    text-align: right;
    font-size: 1em;
    font-style: italic;
}

.hidden
{
    color: white
}
  
  
  </style>
</head>

<body>
    <blockquote>
        Dobrze widzi się tylko sercem. Najważniejsze jest niewidoczne dla oczu.
    <footer>— Antoine de Saint-Exupery — "Mały Książę", rozdział XXI</footer>
    </blockquote>

    <p class="hidden">
        https://gabuszka22.netlify.com/
    </p>
</body>
</html>
